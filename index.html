<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wooden Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        .tab {
            text-align: center;
            background-color: rgba(204, 204, 204, 0.852);;
            border: #000000;
            border-radius: 1px;
            padding: 20px;
        }
        .tab button {
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: 0.3s;
            font-size: 28px;
            margin: 0 5px;
            position: relative;
        }
        .tab button::after {
            content: "";
            display: block;
            width: 0;
            height: 3px;
            background-color: #ffffff;
            transition: width 0.3s ease;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        .tab button:hover::after {
            width: calc(100% - 10px);
        }
        .tab button.active::after {
            width: calc(100% - 10px);
        }
        .tabcontent {
            display: none;
            padding: 20px;
            border-top: none;
        }
    </style>
</head>
<body>

<div class="tab">
    <button class="tablinks" onclick="openTab(event, 'AboutUs')" id="defaultOpen">About Us</button>
    <button class="tablinks" onclick="openTab(event, 'Products')">Products</button>
</div>

<div id="AboutUs" class="tabcontent">
    <h3>About Us</h3>
    <p>This is some information about us.</p>
</div>

<div id="Products" class="tabcontent">
    <h3>Products</h3>
    <p>Here are our products.</p>
</div>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tabcontent");
        for (i = 0; i < tabcontent.length; i++) {
            tabcontent[i].style.display = "none";
        }
        tablinks = document.getElementsByClassName("tablinks");
        for (i = 0; i < tablinks.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" active", "");
        }
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.className += " active";
        // Update URL hash without reloading the page
        history.pushState(null, null, '#' + tabName);
    }

    // Get the hash from the URL and open corresponding tab
    window.onload = function() {
        var hash = window.location.hash.substring(1);
        if (hash) {
            document.getElementById(hash).style.display = "block";
            var activeButton = document.querySelector('.tab button[data-tab="' + hash + '"]');
            activeButton.click();
        } else {
            document.getElementById('defaultOpen').click();
        }
    };
</script>

</body>
</html>
